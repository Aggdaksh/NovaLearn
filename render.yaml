services:
  - type: web
    name: aggdaksh-novalearn-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://aggdaksh-novalearn.onrender.com
      - key: CORS_ORIGIN
        value: https://aggdaksh-novalearn.onrender.com
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
  - type: web
    name: aggdaksh-novalearn
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://aggdaksh-novalearn-api.onrender.com
      - key: VITE_FIREBASE_APIKEY
        sync: false
      - key: VITE_FIREBASE_AUTHDOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECTID
        sync: false
      - key: VITE_FIREBASE_STORAGEBUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
